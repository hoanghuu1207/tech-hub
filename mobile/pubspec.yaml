name: mobile
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.0
  bloc: ^8.1.0
  equatable: ^2.0.5

  # HTTP & API
  http: ^1.1.0
  dio: ^5.0.0
  web_socket_channel: ^2.4.0

  # Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # UI Components
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.0
  badges: ^3.1.0

  # Utilities
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  uuid: ^4.0.0
  jwt_decoder: ^2.0.1

  # Navigation
  go_router: ^13.0.0

  # Image & Media
  image_picker: ^1.0.0
  speech_to_text: ^7.0.0

  # Date & Time
  easy_date_timeline: ^2.0.9

  # Others
  cupertino_icons: ^1.0.2
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

